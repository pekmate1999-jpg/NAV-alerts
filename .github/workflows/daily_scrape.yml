name: Daily NAV EAF Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # UTC 6:00 = magyar idő szerint 7:00 (tél) / 8:00 (nyár)
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Teszt mód (true/false)'
        required: false
        default: 'false'
      test_html_file:
        description: 'Teszt HTML fájl neve'
        required: false
        default: 'NAV Elektronikus Árverési Felület.html'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run scraper
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          TEST_HTML_FILE: ${{ github.event.inputs.test_html_file || 'NAV Elektronikus Árverési Felület.html' }}
        run: python scraper.py
