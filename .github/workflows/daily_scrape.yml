name: Daily NAV EAF Scraper

on:
  # UTC 6:00 = magyar idő szerint 7:00 (tél) / 8:00 (nyár)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-telegram-bot PyPDF2
        
      - name: Run scraper
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          REAL_ESTATE_BOT_TOKEN: ${{ secrets.REAL_ESTATE_BOT_TOKEN }}
          REAL_ESTATE_CHAT_ID: ${{ secrets.REAL_ESTATE_CHAT_ID }}
        run: python scraper.py
