name: Test Real Estate Bot

on: [push] # You need to specify a trigger

jobs:
  test-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install python-telegram-bot
      
      - name: Run Telegram Bot Script
        env:
          REAL_ESTATE_BOT_TOKEN: ${{ secrets.REAL_ESTATE_BOT_TOKEN }}
          REAL_ESTATE_CHAT_ID: ${{ secrets.REAL_ESTATE_CHAT_ID }}
        run: |
          python -c "
          import os
          from telegram import Bot
          import asyncio
          
          async def main():
              token = os.environ.get('REAL_ESTATE_BOT_TOKEN')
              chat_id = os.environ.get('REAL_ESTATE_CHAT_ID')
              print(f'Token hossza: {len(token)}, első 5: {token[:5]}')
              bot = Bot(token=token)
              await bot.send_message(chat_id=chat_id, text='🔔 Teszt a NAV scriptből')
              print('Sikeres')
          
          asyncio.run(main())
          "
